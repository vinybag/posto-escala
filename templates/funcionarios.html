{% extends "base.html" %}
{% block content %}
<h2>Cadastro de Funcionários</h2>

<div class="row mt-4">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h5>Novo Funcionário</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('novo_funcionario') }}" method="POST">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" name="nome" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5>Funcionários Cadastrados</h5>
            </div>
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for func in funcionarios %}
                        <tr>
                            <td>{{ func.nome }}</td>
                            <td>
                                {% if func.ativo %}
                                <span class="badge bg-success">Ativo</span>
                                {% else %}
                                <span class="badge bg-danger">Inativo</span>
                                {% endif %}
                            </td>
                            <td>
                                <a href="{{ url_for('excluir_funcionario', id=func.id) }}" 
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Tem certeza?')">Excluir</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
