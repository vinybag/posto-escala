{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Editar Funcionario: {{ funcionario.nome }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" name="nome" 
                               value="{{ funcionario.nome }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="preferencia" class="form-label">Preferencia de Turno</label>
                        <select class="form-control" id="preferencia" name="preferencia">
                            <option value="misto" {% if funcionario.preferencia_turno == 'misto' %}selected{% endif %}>
                                Sem preferencia (Misto)
                            </option>
                            <option value="manha" {% if funcionario.preferencia_turno == 'manha' %}selected{% endif %}>
                                Somente Manha
                            </option>
                            <option value="tarde" {% if funcionario.preferencia_turno == 'tarde' %}selected{% endif %}>
                                Somente Tarde
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="pode_folgar_domingo" class="form-label">Pode folgar no domingo?</label>
                        <select class="form-control" id="pode_folgar_domingo" name="pode_folgar_domingo">
                            <option value="sim" {% if funcionario.pode_folgar_domingo %}selected{% endif %}>Sim</option>
                            <option value="nao" {% if not funcionario.pode_folgar_domingo %}selected{% endif %}>Nao</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="ativo" class="form-label">Status</label>
                        <select class="form-control" id="ativo" name="ativo">
                            <option value="sim" {% if funcionario.ativo %}selected{% endif %}>Ativo</option>
                            <option value="nao" {% if not funcionario.ativo %}selected{% endif %}>Inativo</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-secondary">Salvar Alteracoes</button>
                    <a href="{{ url_for('listar_funcionarios') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
