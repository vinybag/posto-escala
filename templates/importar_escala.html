{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Importar Escala</h2>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Voltar</a>
</div>

<form method="POST">
    <div class="row mb-3">
        <div class="col-md-3">
            <label class="form-label">Data de inicio (segunda-feira):</label>
            <input type="date" class="form-control" name="data_inicio" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">&nbsp;</label>
            <button type="submit" class="btn btn-secondary w-100">Importar Escala</button>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered escala-table">
            <thead class="table-dark">
                <tr>
                    <th>Funcionario</th>
                    <th>Horario</th>
                    {% for dia in dias_semana %}
                    <th class="text-center">{{ dia }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for i in range(20) %}
                <tr>
                    <td>
                        <select class="form-select form-select-sm" name="funcionario_{{ i }}">
                            <option value="">-- Vazio --</option>
                            {% for func in funcionarios %}
                            <option value="{{ func.id }}">{{ func.nome }}</option>
                            {% endfor %}
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm" name="horario_{{ i }}">
                            <option value="">-- Horario --</option>
                            {% for h in todos_horarios %}
                            <option value="{{ h }}">{{ h.replace('-', ' as ') }}</option>
                            {% endfor %}
                        </select>
                    </td>
                    {% for dia in range(7) %}
                    <td class="text-center">
                        <select class="form-select form-select-sm" name="status_{{ i }}_{{ dia }}">
                            <option value="">--</option>
                            <option value="trabalho">Trabalho</option>
                            <option value="folga">FOLGA</option>
                        </select>
                    </td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    
    <div class="mt-3">
        <button type="submit" class="btn btn-secondary btn-lg">Importar Escala</button>
    </div>
</form>
{% endblock %}
